<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat Archive — Year Selector</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e1621;
      --bg-chat:     #17212b;
      --sidebar-bg:  #0b1018;
      --bubble-me:   #2b5278;
      --bubble-me-hl:#3d6d9e;
      --bubble-other:#182533;
      --bubble-other-hl:#243444;
      --name-me:     #71bafa;
      --name-other:  #5eb5a6;
      --text:        #e8eaed;
      --text-dim:    #6c7883;
      --topbar:      #17212b;
      --topbar-border: #0d1823;
      --input-bg:    #242f3d;
      --input-focus: #2b3a4d;
      --highlight:   #f4c542;
      --highlight-active: #ff9500;
      --radius:      12px;
      --radius-sm:   6px;
      --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ─── Layout: sidebar + main with mobile overlay ─────────────────── */
    .app {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
    }

    /* SIDEBAR — collapsible, slide-out on mobile */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--topbar-border);
      display: flex;
      flex-direction: column;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 2px 0 12px rgba(0,0,0,0.3);
      overflow-y: auto;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    /* Desktop: sidebar always visible */
    @media (min-width: 768px) {
      .sidebar {
        position: relative;
        transform: translateX(0) !important;
        width: 260px;
        box-shadow: none;
      }
      .menu-toggle {
        display: none !important;
      }
      .sidebar-overlay {
        display: none !important;
      }
    }

    /* Mobile overlay when sidebar is open */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.5px;
      color: var(--name-me);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .close-sidebar-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text-dim);
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (min-width: 768px) {
      .close-sidebar-btn {
        display: none;
      }
    }

    .file-list {
      list-style: none;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .file-item {
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all 0.15s;
      background: rgba(255,255,255,0.02);
      border: none;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .file-item:hover {
      background: rgba(113, 186, 250, 0.12);
      color: var(--text);
    }

    .file-item.active {
      background: var(--bubble-me);
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .year-badge {
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.12);
      width: 48px;
      text-align: center;
      padding: 3px 0;
      border-radius: 20px;
    }

    .file-item.active .year-badge {
      background: rgba(255,255,255,0.25);
    }

    /* Main area */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    /* Top bar with menu button */
    .topbar {
      background: var(--topbar);
      border-bottom: 1px solid var(--topbar-border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      min-height: 56px;
      flex-shrink: 0;
    }

    .menu-toggle {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .menu-toggle:hover {
      background: rgba(255,255,255,0.08);
    }

    .menu-toggle svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .icon-chat {
      width: 22px; height: 22px;
      color: var(--name-me);
    }

    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--input-bg);
      border-radius: 20px;
      padding: 0 8px 0 14px;
      transition: background 0.15s;
      min-width: 0;
    }

    .search-bar:focus-within { background: var(--input-focus); }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      padding: 8px 0;
      min-width: 0;
    }

    #search-input::placeholder { color: var(--text-dim); }

    .search-counter {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 55px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .nav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .nav-btn svg { width: 17px; height: 17px; }
    .nav-btn:not(:disabled):hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* Chat container & scroll */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-chat);
      scroll-behavior: smooth;
      position: relative;
    }

    #chat-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    #messages {
      position: relative;
      z-index: 1;
      padding: 16px 0 32px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Loading / error states */
    .loading-state, .error-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      z-index: 2;
      background: var(--bg-chat);
    }

    .loading-state[hidden], .error-state[hidden] { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--name-me);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      z-index: 99;
      background: transparent;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--name-me), var(--name-other));
      transition: width 0.2s ease;
    }

    /* Messages & bubbles */
    .msg-row { display: flex; padding: 2px 12px; animation: fadeIn 0.08s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .msg-row.me { justify-content: flex-end; }
    .msg-row.other { justify-content: flex-start; }

    .bubble {
      max-width: min(78%, 520px);
      padding: 8px 12px 7px;
      border-radius: var(--radius);
      word-break: break-word;
    }
    .me .bubble { background: var(--bubble-me); border-bottom-right-radius: var(--radius-sm); }
    .other .bubble { background: var(--bubble-other); border-bottom-left-radius: var(--radius-sm); }
    .msg-row.active-match .bubble { box-shadow: 0 0 0 2px rgba(113,186,250,0.6); }
    .msg-row.other.active-match .bubble { box-shadow: 0 0 0 2px rgba(94,181,166,0.6); }

    .msg-sender { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .me .msg-sender { color: var(--name-me); }
    .other .msg-sender { color: var(--name-other); }
    .chain-top .msg-sender { display: none; }

    .msg-text { font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .msg-footer { display: flex; justify-content: flex-end; margin-top: 3px; }
    .msg-time { font-size: 11px; color: rgba(255,255,255,0.45); }
    .fwd-tag { font-size: 11px; color: var(--name-other); margin-bottom: 4px; border-left: 2px solid var(--name-other); padding-left: 8px; }

    .date-divider { display: flex; justify-content: center; padding: 12px 16px 8px; }
    .date-divider span { background: rgba(255,255,255,0.06); padding: 4px 10px; border-radius: 10px; font-size: 12px; }

    mark.highlight { background: var(--highlight); color: #1a1a1a; border-radius: 2px; padding: 0 1px; font-weight: 600; }
    mark.highlight.current { background: var(--highlight-active); color: #fff; box-shadow: 0 0 0 2px rgba(255,149,0,0.5); }

    /* Mobile adjustments */
    @media (max-width: 767px) {
      .topbar-title span:first-of-type { display: none; }
      .bubble { max-width: 88%; }
      .msg-row { padding: 2px 8px; }
      .search-counter { min-width: 48px; font-size: 10px; }
      .topbar { gap: 6px; padding: 8px 10px; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar overlay (mobile only) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Collapsible Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span>📁 CHAT ARCHIVE</span>
      <button id="close-sidebar-btn" class="close-sidebar-btn" aria-label="Close menu">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Close
      </button>
    </div>
    <ul class="file-list" id="file-list"></ul>
    <div style="padding: 16px; font-size: 11px; color: #4a5568; border-top: 1px solid rgba(255,255,255,0.05);">
      📁 Select a year
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-title">
        <svg class="icon-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="current-file-label">Loading...</span>
      </div>
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="Search messages…" autocomplete="off" />
        <div id="search-counter" class="search-counter"></div>
        <button id="btn-prev" class="nav-btn" title="Previous match" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button id="btn-next" class="nav-btn" title="Next match" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </header>

    <div id="chat-container">
      <div id="loading" class="loading-state">
        <div class="spinner"></div>
        <p>Loading messages…</p>
      </div>
      <div id="error" class="error-state" hidden>
        <p>⚠️ Could not load chat file.</p>
        <p class="error-hint">Make sure JSON files (chat_2020.json ... chat_2026.json) exist.</p>
      </div>
      <div id="messages" role="log" aria-label="Chat messages"></div>
    </div>
    <div id="progress-wrap" class="progress-wrap" hidden>
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>
</div>

<script>
  "use strict";

  // ========== CONFIGURATION ==========
  const YEARS = [2020, 2021, 2022, 2023, 2024, 2025, 2026];
  // ===================================

  // ---------- GLOBALS ----------
  let currentMessages = [];
  let renderMeta = [];
  let renderedUpTo = 0;
  let idleHandle = null;

  let matches = [];
  let currentMatchIndex = 0;
  let searchTerm = "";
  let pendingJumpIndex = null;

  // DOM elements
  const messagesEl = document.getElementById("messages");
  const loadingEl = document.getElementById("loading");
  const errorEl = document.getElementById("error");
  const progressBar = document.getElementById("progress-bar");
  const progressWrap = document.getElementById("progress-wrap");
  const searchInput = document.getElementById("search-input");
  const searchCounter = document.getElementById("search-counter");
  const btnPrev = document.getElementById("btn-prev");
  const btnNext = document.getElementById("btn-next");
  const fileListEl = document.getElementById("file-list");
  const currentFileLabel = document.getElementById("current-file-label");
  const sidebar = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebar-overlay");
  const menuToggle = document.getElementById("menu-toggle");
  const closeSidebarBtn = document.getElementById("close-sidebar-btn");

  // Sidebar functions (mobile)
  function openSidebar() {
    if (window.innerWidth < 768) {
      sidebar.classList.add("open");
      sidebarOverlay.classList.add("active");
      document.body.style.overflow = "hidden";
    }
  }

  function closeSidebar() {
    if (window.innerWidth < 768) {
      sidebar.classList.remove("open");
      sidebarOverlay.classList.remove("active");
      document.body.style.overflow = "";
    }
  }

  function toggleSidebar() {
    if (sidebar.classList.contains("open")) {
      closeSidebar();
    } else {
      openSidebar();
    }
  }

  // Close sidebar when clicking overlay
  sidebarOverlay.addEventListener("click", closeSidebar);
  menuToggle.addEventListener("click", toggleSidebar);
  if (closeSidebarBtn) closeSidebarBtn.addEventListener("click", closeSidebar);

  // On window resize, ensure sidebar state is correct
  window.addEventListener("resize", () => {
    if (window.innerWidth >= 768) {
      sidebar.classList.remove("open");
      sidebarOverlay.classList.remove("active");
      document.body.style.overflow = "";
    }
  });

  // Rendering constants
  const INITIAL_BATCH = 280;
  const IDLE_BATCH = 500;
  const IDLE_DEADLINE = 38;

  // ---------- Helper functions (unchanged from working version) ----------
  function decodeColumnar(raw) {
    if (Array.isArray(raw)) return raw;
    if (raw && raw.v === 1 && Array.isArray(raw.fields) && Array.isArray(raw.rows)) {
      const fields = raw.fields;
      return raw.rows.map(row => {
        const msg = {};
        for (let i = 0; i < fields.length; i++) msg[fields[i]] = row[i] !== undefined ? row[i] : null;
        if (msg.is_forwarded !== undefined) msg.is_forwarded = !!msg.is_forwarded;
        return msg;
      });
    }
    throw new Error("Invalid chat data format");
  }

  function parseTimestamp(ts) {
    if (!ts) return null;
    const m = ts.match(/^(\d{2})\.(\d{2})\.(\d{4})\s+(\d{2}):(\d{2}):(\d{2})\s+UTC([+-]\d{2}:\d{2})$/);
    if (!m) return null;
    const [, dd, mo, yyyy, hh, mm, ss, tz] = m;
    const d = new Date(`${yyyy}-${mo}-${dd}T${hh}:${mm}:${ss}${tz}`);
    return isNaN(d) ? null : d;
  }

  function formatDate(ts) {
    const d = parseTimestamp(ts);
    if (!d) return ts ? ts.slice(0, 10) : "Unknown";
    return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
  }

  function formatTime(ts) {
    if (!ts) return "";
    const m = ts.match(/(\d{2}:\d{2}):\d{2}/);
    return m ? m[1] : "";
  }

  function isOwnMessage(sender) { return sender === "Amirhosein"; }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function buildRenderMetaForCurrent() {
    let lastDate = null, lastSender = null;
    renderMeta = currentMessages.map((msg, i) => {
      const dateStr = formatDate(msg.timestamp);
      const showDate = dateStr !== lastDate;
      const isMe = isOwnMessage(msg.sender);
      const chainTop = !showDate && (msg.sender === lastSender);
      lastDate = dateStr;
      lastSender = msg.sender;
      return { dateStr, showDate, isMe, chainTop };
    });
  }

  function makeDateDivider(label) {
    const div = document.createElement("div");
    div.className = "date-divider";
    const span = document.createElement("span");
    span.textContent = label;
    div.appendChild(span);
    return div;
  }

  function makeMessageRow(msg, idx, isMe, chainTop) {
    const row = document.createElement("div");
    row.className = `msg-row ${isMe ? "me" : "other"}${chainTop ? " chain-top" : ""}`;
    row.dataset.index = idx;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const sender = document.createElement("div");
    sender.className = "msg-sender";
    sender.textContent = msg.sender;
    bubble.appendChild(sender);
    if (msg.is_forwarded && msg.forwarded_from) {
      const fwd = document.createElement("div");
      fwd.className = "fwd-tag";
      fwd.textContent = `Forwarded from ${msg.forwarded_from}`;
      bubble.appendChild(fwd);
    }
    const textDiv = document.createElement("div");
    textDiv.className = "msg-text";
    textDiv.innerHTML = escapeHtml(msg.text || "");
    bubble.appendChild(textDiv);
    const footer = document.createElement("div");
    footer.className = "msg-footer";
    const timeSpan = document.createElement("span");
    timeSpan.className = "msg-time";
    timeSpan.textContent = formatTime(msg.timestamp);
    footer.appendChild(timeSpan);
    bubble.appendChild(footer);
    row.appendChild(bubble);
    return row;
  }

  function renderBatch(from, to) {
    if (from >= to) return;
    const frag = document.createDocumentFragment();
    for (let i = from; i < to; i++) {
      const msg = currentMessages[i];
      const meta = renderMeta[i];
      if (meta.showDate) frag.appendChild(makeDateDivider(meta.dateStr));
      frag.appendChild(makeMessageRow(msg, i, meta.isMe, meta.chainTop));
    }
    messagesEl.appendChild(frag);
    renderedUpTo = to;
    if (progressBar && currentMessages.length) {
      const pct = Math.round((renderedUpTo / currentMessages.length) * 100);
      progressBar.style.width = pct + "%";
      if (renderedUpTo >= currentMessages.length && progressWrap) {
        setTimeout(() => { if (progressWrap) progressWrap.hidden = true; }, 300);
      }
    }
    if (pendingJumpIndex !== null && pendingJumpIndex < renderedUpTo) {
      const jump = pendingJumpIndex;
      pendingJumpIndex = null;
      finishActivateMatch(jump);
    }
  }

  const requestIdleCompat = (typeof requestIdleCallback === "function")
    ? (cb) => requestIdleCallback(cb, { timeout: 500 })
    : (cb) => setTimeout(() => cb({ timeRemaining: () => 0 }), 16);
  const cancelIdleCompat = (typeof cancelIdleCallback === "function") ? (id) => cancelIdleCallback(id) : clearTimeout;

  function scheduleIdleRender() {
    const tick = (deadline) => {
      const end = Math.min(renderedUpTo + IDLE_BATCH, currentMessages.length);
      renderBatch(renderedUpTo, end);
      if (renderedUpTo < currentMessages.length) idleHandle = requestIdleCompat(tick);
      else { if (progressWrap) progressWrap.hidden = true; }
    };
    idleHandle = requestIdleCompat(tick);
  }

  function renderUpTo(targetIndex) {
    if (targetIndex < renderedUpTo) return;
    if (idleHandle) { cancelIdleCompat(idleHandle); idleHandle = null; }
    const end = Math.min(targetIndex + 1, currentMessages.length);
    renderBatch(renderedUpTo, end);
    if (renderedUpTo < currentMessages.length) scheduleIdleRender();
    else if (progressWrap) progressWrap.hidden = true;
  }

  function resetRenderState() {
    if (idleHandle) cancelIdleCompat(idleHandle);
    idleHandle = null;
    messagesEl.innerHTML = "";
    renderedUpTo = 0;
    pendingJumpIndex = null;
    if (progressWrap) progressWrap.hidden = false;
    if (progressBar) progressBar.style.width = "0%";
  }

  function highlightText(text, term, isCurrent) {
    if (!term) return escapeHtml(text);
    const escaped = escapeHtml(text);
    const lowerSrc = escaped.toLowerCase();
    const lowerTerm = escapeHtml(term).toLowerCase();
    const len = lowerTerm.length;
    let result = "", cursor = 0, first = true;
    while (cursor < escaped.length) {
      const pos = lowerSrc.indexOf(lowerTerm, cursor);
      if (pos === -1) { result += escaped.slice(cursor); break; }
      result += escaped.slice(cursor, pos);
      const cls = (isCurrent && first) ? "highlight current" : "highlight";
      result += `<mark class="${cls}">${escaped.slice(pos, pos + len)}</mark>`;
      first = false;
      cursor = pos + len;
    }
    return result;
  }

  function clearHighlightsAndReset() {
    document.querySelectorAll(".msg-row.active-match").forEach(el => el.classList.remove("active-match"));
    for (let i = 0; i < renderedUpTo; i++) {
      const row = messagesEl.querySelector(`[data-index="${i}"]`);
      if (row && currentMessages[i]) {
        const textEl = row.querySelector(".msg-text");
        if (textEl) textEl.innerHTML = escapeHtml(currentMessages[i].text || "");
      }
    }
  }

  function applyHighlightsToRenderedMatches() {
    if (!searchTerm) return;
    for (let mi = 0; mi < matches.length; mi++) {
      const idx = matches[mi];
      if (idx >= renderedUpTo) continue;
      const row = messagesEl.querySelector(`[data-index="${idx}"]`);
      if (row) {
        const textEl = row.querySelector(".msg-text");
        if (textEl) {
          const activeFlag = (mi === currentMatchIndex);
          textEl.innerHTML = highlightText(currentMessages[idx].text || "", searchTerm, activeFlag);
        }
        if (mi === currentMatchIndex) row.classList.add("active-match");
        else row.classList.remove("active-match");
      }
    }
  }

  function runSearch() {
    clearHighlightsAndReset();
    const rawTerm = searchInput.value;
    searchTerm = rawTerm.trim();
    matches = [];
    currentMatchIndex = 0;
    if (!searchTerm) {
      searchCounter.textContent = "";
      setNavEnabled(false);
      return;
    }
    const lowerTerm = searchTerm.toLowerCase();
    for (let i = 0; i < currentMessages.length; i++) {
      if ((currentMessages[i].text || "").toLowerCase().includes(lowerTerm)) matches.push(i);
    }
    updateCounter();
    setNavEnabled(matches.length > 0);
    if (matches.length === 0) return;
    applyHighlightsToRenderedMatches();
    activateMatch(0);
  }

  function activateMatch(newIdx) {
    if (matches.length === 0) return;
    if (currentMatchIndex >= 0 && currentMatchIndex < matches.length) {
      const prevIdx = matches[currentMatchIndex];
      const prevRow = messagesEl.querySelector(`[data-index="${prevIdx}"]`);
      if (prevRow) {
        prevRow.classList.remove("active-match");
        const t = prevRow.querySelector(".msg-text");
        if (t) t.innerHTML = highlightText(currentMessages[prevIdx].text || "", searchTerm, false);
      }
    }
    currentMatchIndex = newIdx;
    const targetIdx = matches[currentMatchIndex];
    if (targetIdx >= renderedUpTo) {
      pendingJumpIndex = targetIdx;
      renderUpTo(targetIdx);
      applyHighlightsToRenderedMatches();
      return;
    }
    finishActivateMatch(targetIdx);
  }

  function finishActivateMatch(idx) {
    const row = messagesEl.querySelector(`[data-index="${idx}"]`);
    if (!row) return;
    row.classList.add("active-match");
    const textEl = row.querySelector(".msg-text");
    if (textEl) textEl.innerHTML = highlightText(currentMessages[idx].text || "", searchTerm, true);
    row.scrollIntoView({ behavior: "smooth", block: "center" });
    updateCounter();
  }

  function nextMatch() { if (matches.length) activateMatch((currentMatchIndex + 1) % matches.length); }
  function prevMatch() { if (matches.length) activateMatch((currentMatchIndex - 1 + matches.length) % matches.length); }
  function updateCounter() {
    if (!searchTerm) searchCounter.textContent = "";
    else if (!matches.length) searchCounter.textContent = "No results";
    else searchCounter.textContent = `${currentMatchIndex + 1} / ${matches.length}`;
  }
  function setNavEnabled(on) { btnPrev.disabled = !on; btnNext.disabled = !on; }

  async function loadChatFile(year) {
    const fileName = `chat_${year}.json`;
    resetRenderState();
    errorEl.hidden = true;
    loadingEl.hidden = false;
    messagesEl.innerHTML = "";
    currentMessages = [];
    renderMeta = [];
    matches = [];
    searchTerm = "";
    searchInput.value = "";
    searchCounter.textContent = "";
    setNavEnabled(false);
    currentFileLabel.textContent = `Chat ${year}`;
    // Auto-close sidebar on mobile after selection
    closeSidebar();

    try {
      const res = await fetch(fileName);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      currentMessages = decodeColumnar(raw);
      if (!currentMessages.length) throw new Error("Empty messages");
      buildRenderMetaForCurrent();
      const initial = Math.min(INITIAL_BATCH, currentMessages.length);
      renderBatch(0, initial);
      if (renderedUpTo < currentMessages.length) scheduleIdleRender();
      else if (progressWrap) progressWrap.hidden = true;
      loadingEl.hidden = true;
      if (searchInput.value.trim()) runSearch();
    } catch (err) {
      console.error(err);
      loadingEl.hidden = true;
      errorEl.hidden = false;
    }
  }

  async function buildSidebar() {
    fileListEl.innerHTML = "";
    let firstYear = null;
    for (const year of YEARS) {
      const li = document.createElement("li");
      const btn = document.createElement("button");
      btn.className = "file-item";
      btn.innerHTML = `<span class="year-badge">${year}</span><span class="file-name">Chat ${year}</span>`;
      btn.addEventListener("click", async (e) => {
        document.querySelectorAll(".file-item").forEach(el => el.classList.remove("active"));
        btn.classList.add("active");
        await loadChatFile(year);
      });
      li.appendChild(btn);
      fileListEl.appendChild(li);
      if (!firstYear) firstYear = year;
    }
    if (firstYear) {
      const firstBtn = fileListEl.querySelector(".file-item");
      if (firstBtn) firstBtn.classList.add("active");
      await loadChatFile(firstYear);
    } else {
      loadingEl.hidden = true;
      errorEl.hidden = false;
    }
  }

  function bindEvents() {
    let deb;
    searchInput.addEventListener("input", () => {
      clearTimeout(deb);
      deb = setTimeout(() => runSearch(), 160);
    });
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); e.shiftKey ? prevMatch() : nextMatch(); }
      if (e.key === "Escape") { searchInput.value = ""; runSearch(); }
    });
    btnNext.addEventListener("click", nextMatch);
    btnPrev.addEventListener("click", prevMatch);
  }

  bindEvents();
  buildSidebar();
</script>
</body>
</html>
