<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Chat Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-title">
      <svg class="icon-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Chat Archive</span>
    </div>
    <div class="search-bar">
      <input
        id="search-input"
        type="text"
        placeholder="Search messages…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="search-counter" class="search-counter"></div>
      <button id="btn-prev" class="nav-btn" title="Previous" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button id="btn-next" class="nav-btn" title="Next" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </header>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h3>Chat Files</h3>
    </div>
    <div class="sidebar-stats">
      <div id="total-messages">Loading...</div>
    </div>
    <div class="file-list" id="file-list">
      <div class="loading-files">Loading files...</div>
    </div>
  </aside>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div id="progress-wrap" class="progress-wrap" hidden>
    <div id="progress-bar" class="progress-bar"></div>
  </div>

  <main id="chat-container">
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading messages…</p>
    </div>
    <div id="error" class="error-state" hidden>
      <p>⚠️ Could not load chat file.</p>
      <p class="error-hint">Make sure index.json exists</p>
    </div>
    <div id="messages"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
