<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-title">
      <svg class="icon-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Chat Archive</span>
    </div>
    <div class="search-bar">
      <input
        id="search-input"
        type="text"
        placeholder="Search messages…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="search-counter" class="search-counter" aria-live="polite"></div>
      <button id="btn-prev" class="nav-btn" title="Previous match" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button id="btn-next" class="nav-btn" title="Next match" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </header>

  <!-- Progress bar: shown while background rendering is ongoing -->
  <div id="progress-wrap" class="progress-wrap" hidden>
    <div id="progress-bar" class="progress-bar"></div>
  </div>

  <main id="chat-container">
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading messages…</p>
    </div>
    <div id="error" class="error-state" hidden>
      <p>⚠️ Could not load <code>chat.min.json</code>.</p>
      <p class="error-hint">Run <code>python3 convert.py</code> first, then place <code>chat.min.json</code> alongside <code>index.html</code>.</p>
    </div>
    <div id="messages" role="log" aria-label="Chat messages"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
